# Production Docker Compose configuration
# PostgreSQL database + Next.js application

services:
  # PostgreSQL Database
  postgres:
    image: pgvector/pgvector:pg15
    container_name: fb-net-db
    command: postgres -c listen_addresses='*'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-prod-data:/var/lib/postgresql/data
      # Database schema initialization on first run (only for new installs)
      - ./database-schema.sql:/docker-entrypoint-initdb.d/00-init-schema.sql:ro
      # Migrations folder for manual application
      - ./migrations:/migrations:ro
    networks:
      - fb-net-prod-network
    restart: always

  # Public site + backend/API
  site:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fb-net-site
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      # Database connection
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD}@postgres:5432/postgres
      # Admin panel authentication
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      # Telegram notifications (optional)
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_ADMIN_CHAT_ID: ${TELEGRAM_ADMIN_CHAT_ID:-}
      TELEGRAM_WEBHOOK_URL: ${TELEGRAM_WEBHOOK_URL:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      POLZA_API_KEY: ${POLZA_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      YANDEX_GEOCODER_API_KEY: ${YANDEX_GEOCODER_API_KEY:-}
      YANDEX_DIRECT_TOKEN: ${YANDEX_DIRECT_TOKEN:-}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      TARGET_EMAIL: ${TARGET_EMAIL:-}
      IMAP_HOST: ${IMAP_HOST:-imap.mail.ru}
      IMAP_PORT: ${IMAP_PORT:-993}
    volumes:
      - crm-attachments-data:/data/crm-attachments
      - ./public/uploads:/app/public/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - fb-net-prod-network
    restart: always
    # Security enhancements
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:noexec,nosuid,size=100M
    read_only: false  # Cannot be true due to Next.js cache requirements
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE

  # Admin UI only (all API requests proxied to site)
  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
    container_name: fb-net-admin
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
      # Used when admin service is accessed directly (without nginx split routing)
      ADMIN_API_ORIGIN: http://site:3000
    depends_on:
      site:
        condition: service_started
    networks:
      - fb-net-prod-network
    restart: always
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:noexec,nosuid,size=100M
    read_only: false
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE

volumes:
  postgres-prod-data:
  crm-attachments-data:

networks:
  fb-net-prod-network:
    driver: bridge
